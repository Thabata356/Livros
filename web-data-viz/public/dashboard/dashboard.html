<body>

    <div class="janela">
        
        
        <!-- ÁREA DOS KPIS -->
        <div class="box-agrupamento Kpis">

            <div class="grupo-kpis">
                <div class="kpi" id="kpi1">
                    <h4>Páginas Lidas</h4>
                    <h3>1207</h3>
                </div>
            </div>

            <div class="grupo-kpis">
                <div class="kpi" id="kpi2">
                    <h4>Livros Concluídos</h4>
                    <h3>5 de 12</h3>
                </div>
            </div>

            <div class="grupo-kpis">
                <div class="kpi" id="kpi3">
                    <h4>Meta do Ano</h4>
                    <h3>12</h3>
                </div>
            </div>

        </div>



        <div class="dash">
            <div id="alerta">
            </div>

            <div class="btns-dash" id="btnLivros">
                <!-- O gráfico é chamado de acordo com o id_livro (fk_aquario) do banco  -->
            </div>
            <div id="graficos">
            </div>
        </div>
    </div>


</body>

</html>

<script>
    // A parte que aparece o nome do usuario
    // b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    window.onload = exibirLivrosDoUsuario();

    function exibirLivrosDoUsuario() {
        var livros = JSON.parse(sessionStorage.LIVROS);
        livros.forEach(item => {
            document.getElementById("btnLivros").innerHTML += `
            <button class="btn-chart" onclick="exibirLivros(${item.id_livro})" id="btnLivros${item.id_livro}">${item.nome}</button>
            `

            document.getElementById("graficos").innerHTML += `
                <div id="grafico${item.id_livro}" class="display-none">
                    <h3 class="tituloGraficos">
                        <span id="tituloLivros${item.id_livro}">${item.nome}</span>
                    </h3>
                    <div class="graph">
                        <canvas id="myChartCanvas${item.id_livro}"></canvas>
                    </div>
                    <div class="label-captura">
                        <p id="avisoCaptura${item.id_livro}" style="color: white"></p>
                    </div>
                </div>
            `

            obterDadosGrafico(item.id_livro)
        });

        if (livros.length > 0) {
            exibirLivros(livros[0].id_livro)
        }
    }

    function alterarTitulo(id_livro) {
        var tituloLivro = document.getElementById(`tituloLivros${id_livro}`)
        var nome = JSON.parse(sessionStorage.LIVROS).find(item => item.id_livro == id_livro).nome;
        tituloLivro.innerHTML = "Histórico de leitura do livro: <span style='color: #e6005a'>" + nome + "</span>";
    }

    function exibirLivros(id_livro) {
        let todosOsGraficos = JSON.parse(sessionStorage.LIVROS);

        for (i = 0; i < todosOsGraficos.length; i++) {
            // exibindo - ou não - o gráfico
            if (todosOsGraficos[i].id_livro != id_livro) {
                let elementoAtual = document.getElementById(`grafico${todosOsGraficos[i].id_livro}`)
                if (elementoAtual.classList.contains("display-block")) {
                    elementoAtual.classList.remove("display-block")
                }
                elementoAtual.classList.add("display-none")

                // alterando estilo do botão
                let btnAtual = document.getElementById(`btnLivros${todosOsGraficos[i].id_livro}`)
                if (btnAtual.classList.contains("btn-pink")) {
                    btnAtual.classList.remove("btn-pink")
                }
                btnAtual.classList.add("btn-white")
            }
        }

        // exibindo - ou não - o gráfico
        let graficoExibir = document.getElementById(`grafico${id_livro}`)
        graficoExibir.classList.remove("display-none")
        graficoExibir.classList.add("display-block")

        // alterando estilo do botão
        let btnExibir = document.getElementById(`btnLivros${id_livro}`)
        btnExibir.classList.remove("btn-white")
        btnExibir.classList.add("btn-pink")
    }

    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazid_livroos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inserid_livroos em tabela de medid_livroas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGrafico(id_livro) {

        alterarTitulo(id_livro)

        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }

        fetch(`/medidas/ultimas/${id_livro}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta, id_livro);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
                console.log("Status do erro:", response.status);
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGrafico(resposta, id_livro) {

        //Mudei o plotar graficos para as minhas informações;

        console.log('iniciando plotagem do gráfico...');

        let labels = [];
        let dados = {
            labels: labels,
            datasets: [{
                label: 'Páginas Lidas',
                data: [],
                fill: false,
                borderColor: '#567C8D',
                tension: 0.1
            }]
        };

        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.momento_grafico);
            dados.datasets[0].data.push(registro.paginas);
        }

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebid_livroos em estrutura para plotar o gráfico
        // for (i = 0; i < resposta.length; i++) {
        //     var registro = resposta[i];
        //     labels.push(registro.momento_grafico);
        //     dados.datasets[0].data.push(registro.id_livro);
        // dados.datasets[1].data.push(registro.temperatura);
        // }

    console.log('----------------------------------------------')
    console.log('O gráfico será plotado com os respectivos valores:')
    console.log('Labels:')
    console.log(labels)
    console.log('Dados:')
    console.log(dados.datasets)
    console.log('----------------------------------------------')

    // Criando estrutura para plotar gráfico - config
    const config = {
        type: 'line',
        data: dados,
    };

    // Adicionando gráfico criado em div na tela
    let myChart = new Chart(
        document.getElementById(`myChartCanvas${id_livro}`),
        config
    );

    setTimeout(() => atualizarGrafico(id_livro, dados, myChart), 2000);

}

    // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
    // buscando a última medid_livroa inserid_livroa em tabela contendo as capturas, 

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function atualizarGrafico(id_livro, dados, myChart) {

        fetch(`/medidas/ultimas/${id_livro}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (novoRegistro) {

                    obterDadosGrafico(id_livro);
                    // alertar(novoRegistro, id_livro);
                    console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);
                    console.log(`Dados atuais do gráfico:`);
                    console.log(dados);

                    let avisoCaptura = document.getElementById(`avisoCaptura${id_livro}`)
                    avisoCaptura.innerHTML = ""


                    if (novoRegistro[0].momento_grafico == dados.labels[dados.labels.length - 1]) {
                        console.log("---------------------------------------------------------------")
                        console.log("Como não há dados novos para captura, o gráfico não atualizará.")
                        avisoCaptura.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> Foi trazido o dado mais atual capturado pelo sensor. <br> Como não há dados novos a exibir, o gráfico não atualizará."
                        console.log("Horário do novo dado capturado:")
                        console.log(novoRegistro[0].momento_grafico)
                        console.log("Horário do último dado capturado:")
                        console.log(dados.labels[dados.labels.length - 1])
                        console.log("---------------------------------------------------------------")
                    } else {
                        // tirando e colocando valores no gráfico
                        dados.labels.shift(); // apagar o primeiro
                        dados.labels.push(novoRegistro[0].momento_grafico); // incluir um novo momento

                        dados.datasets[0].data.shift();  // apagar o primeiro de umidade
                        // dados.datasets[0].data.push(novoRegistro[0].id_livro); // incluir uma nova medida de umidade

                        //dados.datasets[1].data.shift();  // apagar o primeiro de temperatura
                        // dados.datasets[1].data.push(novoRegistro[0].temperatura); // incluir uma nova medida de temperatura

                        myChart.update();
                    }

                    // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
                    proximaAtualizacao = setTimeout(() => atualizarGrafico(id_livro, dados, myChart), 2000);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
                // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
                proximaAtualizacao = setTimeout(() => atualizarGrafico(id_livro, dados, myChart), 2000);
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

    }
</script>
