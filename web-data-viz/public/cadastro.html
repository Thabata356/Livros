<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/cadastro.css" />
  <link rel="icon" href="./assets/imgs/logo.png" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<div class="login">
  <div class="alerta_erro">
    <div class="card_erro" id="cardErro">
      <span id="mensagem_erro"></span>
    </div>
  </div>

  <div class="frase">
    <p>Os livros não matam a fome, não suprimem a miséria, <br>
      não acabam com as desigualdades e com as injustiças do mundo, <br>
      mas consolam as almas, e fazem-nas sonhar.</p>

    <div class="autor">
      <p>- Olavo Bilac Dimas</p>
    </div>
  </div>

  <div class="container">
    <div class="card card-cadastro">
      <h2>Bem-vindo de volta!</h2>
      <div class="formulario">
        <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->

        <div class="campo">
          <span>Nome:</span>
          <input id="ipt_nome" type="text" placeholder="Seu nome completo" />
        </div>
        <div class="campo">
          <span>E-mail:</span>
          <input id="ipt_email" type="text" placeholder="meuemail@.com" />
        </div>
        <div class="campo">
          <span>Senha:</span>
          <input id="ipt_senha" type="password" placeholder="******" />
        </div>
        <div class="campo">
          <span>Confirmação da Senha:</span>
          <input id="ipt_confirmacao_senha" type="password" placeholder="******" />
        </div>
        <button class="botao botao-cadastro" onclick="cadastrar()">Cadastrar</button>

        <a href="login.html" class="botao">Login</a>
      </div>
      <div id="div_aguardar" class="loading-div">
        <img src="./assets/circle-loading.gif" id="loading-gif" />
      </div>

      <div id="div_erros_login"></div>
    </div>
  </div>
</div>

</body>

</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = ipt_nome.value;
    var emailVar = ipt_email.value;
    var senhaVar = ipt_senha.value;
    var confirmacaoSenhaVar = ipt_confirmacao_senha.value;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
